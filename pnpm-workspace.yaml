packages:
    - apps/*
    - packages/*
    - tooling/*

catalog:
    '@better-auth/expo': 1.6.11
    '@eslint/js': ^9.38.0
    '@tailwindcss/postcss': ^4.1.16
    '@tanstack/react-form': ^1.23.8
    '@tanstack/react-query': ^5.90.8
    '@trpc/client': ^11.7.1
    '@trpc/server': ^11.7.1
    '@trpc/tanstack-react-query': ^11.7.1
    '@types/node': ^22.18.12
    better-auth: 1.6.11
    eslint: ^9.38.0
    prettier: ^3.6.2
    tailwindcss: ^4.1.16
    typescript: ^5.9.3
    zod: ^4.1.12

catalogs:
    react19:
        '@types/react': ~19.1.0
        '@types/react-dom': ~19.1.0
        react: 19.1.4
        react-dom: 19.1.4

linkWorkspacePackages: true

onlyBuiltDependencies:
    - '@tailwindcss/oxide'
    - esbuild

overrides:
    '@types/minimatch': 5.1.2
    lightningcss: 1.30.1
    esbuild: 0.25.11
    '@better-auth/utils': '0.4.0'

publicHoistPattern:
    - '@ianvs/prettier-plugin-sort-imports'
    - prettier-plugin-tailwindcss
